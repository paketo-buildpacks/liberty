name: Sync PR to Private Repo

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  sync:
    name: Mirror PR branch to private repo
    runs-on: ubuntu-latest
    # Only run on PRs from the same repo (not forks) to keep the token safe.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Push branch to private repo
        env:
          PRIVATE_REPO_URL: ${{ secrets.PRIVATE_REPO_URL }}
          PAT: ${{ secrets.PRIVATE_REPO_PAT }}
          TARGET_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          # Build the authenticated URL directly in the workflow expression so
          # the PAT is never passed through a masked-secret shell substitution.
          git remote add private "https://x-access-token:${PAT}@${PRIVATE_REPO_URL#https://}"

          git push private "HEAD:refs/heads/${TARGET_BRANCH}" --force

          echo "Pushed to ${TARGET_BRANCH} on private repo."

      - name: Merge branch into private repo default branch
        env:
          PRIVATE_REPO_URL: ${{ secrets.PRIVATE_REPO_URL }}
          PAT: ${{ secrets.PRIVATE_REPO_PAT }}
          TARGET_BRANCH: pr-${{ github.event.pull_request.number }}
          BASE_BRANCH: main
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          git fetch private "${BASE_BRANCH}"
          git checkout -b merge-target "private/${BASE_BRANCH}"
          git merge --no-ff "HEAD@{2}" -m "Merge PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          git push private "merge-target:refs/heads/${BASE_BRANCH}"

          echo "Merged PR #${{ github.event.pull_request.number }} into ${BASE_BRANCH} on private repo."
